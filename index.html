<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رێڤەبەریا مولكی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 10px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 25px 10px; text-align: center; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; background: none; font-size: 13px; font-weight: bold; color: #777; border-bottom: 3px solid transparent; transition: 0.3s; white-space: nowrap; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }
        .content { padding: 20px; min-height: 400px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* تصميم البطاقة المطلوب (1:15) */
        .expense-card { background: #fff; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #eee; border-right: 6px solid #d32f2f; }
        .exp-main { display: flex; justify-content: space-between; align-items: center; }
        .exp-right { text-align: right; flex: 1; }
        .exp-type { font-weight: 900; font-size: 16px; color: #000; }
        .exp-meta { color: #777; font-size: 12px; margin-top: 2px; }
        
        .exp-center { flex: 1; text-align: center; }
        .exp-amount { color: #d32f2f; font-weight: 900; font-size: 20px; display: block; }
        .exp-currency { color: #d32f2f; font-weight: bold; font-size: 14px; margin-top: -2px; display: block; }
        
        .delete-bar { width: 100%; background: #ffefee; color: #d32f2f; padding: 8px; border-radius: 8px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 10px; }

        .owner-box { background: #e3f2fd; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #90caf9; }
        .summary-item { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; font-size: 13px; font-weight: bold;}
        .summary-item.total { border-top: 2px dashed #90caf9; padding-top: 12px; font-weight: 900; color: #b71c1c; font-size: 15px; background: #ffcdd2; padding: 10px; border-radius: 8px; margin-top: 10px;}
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 900; font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; background: #fff; }
        .btn-save { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; background: #1a73e8; color: white; cursor: pointer; }
        .month-box { width: 25px; height: 25px; border-radius: 5px; display: flex; justify-content: center; align-items: center; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="font-weight:900;">🏠 رێڤەبەريا مولكي</h2>
            <p style="font-size: 11px;">سيتەمێ رێكخستنا دارايي (البنك السحابي)</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(event, 'home')">سەرەکی</button>
            <button class="tab-btn" onclick="showTab(event, 'add-income')">داهاتی</button>
            <button class="tab-btn" onclick="showTab(event, 'add-expense')">مەسرهەف</button>
            <button class="tab-btn" onclick="showTab(event, 'settings')">رێكخستن</button>
        </div>
        <div class="content">
            <div id="home" class="tab-content active">
                <div id="captureArea">
                    <div class="owner-box">
                        <div style="color:#0d47a1; font-weight:900; text-align:center; margin-bottom:15px; border-bottom:1px solid #bbdefb; padding-bottom:5px;">📊 حسابێ گشتی</div>
                        <div class="summary-item"><span>المستلم:</span><div style="text-align:left;"><span id="incIQD" style="color:#2e7d32;">0 د.ع</span><br><span id="incUSD" style="color:#1565c0;">0 $</span></div></div>
                        <div class="summary-item"><span>المصروفات:</span><div style="text-align:left;"><span id="expIQD" style="color:#d32f2f;">0 د.ع</span><br><span id="expUSD" style="color:#d32f2f;">0 $</span></div></div>
                        <div class="summary-item total"><span>الباقي عندك:</span><div style="text-align:left;"><span id="balIQD">0 د.ع</span><br><span id="balUSD">0 $</span></div></div>
                    </div>
                    <div id="propertiesList"></div>
                </div>
                <button onclick="exportImage()" style="background:#9c27b0; color:white; width:100%; padding:12px; border-radius:12px; border:none; margin-top:10px; font-weight:bold;">📷 داگرتنا وێنەیی</button>
            </div>

            <div id="add-expense" class="tab-content">
                <h3>تۆماركرنا مَسرهەف:</h3>
                <div class="form-group"><label>جۆر:</label><select id="expenseType"><option value="یێن دى">یێن دى</option><option value="حواله بۆ خودانى">حواله بۆ خودانى</option><option value="صيانة">صيانة</option></select></div>
                <div class="form-group"><label>بڕ:</label><div style="display:flex; gap:10px;"><input type="number" id="expenseAmount" placeholder="0" style="flex:2"><select id="expenseCurrency" style="flex:1"><option value="IQD">د.ع</option><option value="USD">$</option></select></div></div>
                <div class="form-group"><label>تێبینی (ملاحظة):</label><input type="text" id="expenseNote" placeholder="Fib دهوك"></div>
                <div class="form-group"><label>رێکەفت:</label><input type="date" id="expenseDate"></div>
                <button class="btn-save" style="background:#d32f2f;" onclick="addExpense()">تۆمار بکه</button>
                <div id="recentExpenses" style="margin-top:20px;"></div>
            </div>

            <div id="add-income" class="tab-content">
                <h3>تۆماركرنا داهاتی</h3>
                <div class="form-group"><label>کرێدار:</label><select id="incomeProperty"></select></div>
                <div class="form-group"><label>بڕ:</label><div style="display:flex; gap:10px;"><input type="number" id="incomeAmount" placeholder="0" style="flex:2"><select id="incomeCurrency" style="flex:1"><option value="IQD">د.ع</option><option value="USD">$</option></select></div></div>
                <div class="form-group"><label>رێکەفت:</label><input type="date" id="incomeDate"></div>
                <button class="btn-save" onclick="addIncome()">تۆمار بکه</button>
            </div>
            
            <div id="settings" class="tab-content">
                <button onclick="backupData()" style="background:#ff9800; color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold;">💾 حفظ نسخة احتياطية</button>
                <input type="file" id="fileInput" style="display:none;" onchange="restoreData(event)">
                <button onclick="document.getElementById('fileInput').click()" style="background:#f57c00; color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; margin-top:10px;">📂 استعادة البيانات</button>
                <button onclick="if(confirm('Delete all?')){localStorage.clear();location.reload();}" style="background:#d32f2f; color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; margin-top:10px;">⚠️ مسح الكل</button>
            </div>
        </div>
    </div>

    <script>
        let tenants = JSON.parse(localStorage.getItem('tenantList')) || [{"id":"1","name":"شوقە 1 - ماهر","phone":"07828329689","rent":"200000"},{"id":"2","name":"شوقە 2 - جاسم","phone":"07510139556","rent":"200000"},{"id":"3","name":"شوقە 3 - فرهاد","phone":"07504872629","rent":"200000"},{"id":"4","name":"شوقە 4 - كاوة","phone":"07507233020","rent":"200000"},{"id":"5","name":"مەخزەن - ئەرشەد","phone":"07501317377","rent":"2200"}];
        let data = JSON.parse(localStorage.getItem('propertyData')) || {income:[], expense:[]};

        function showTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(e) e.currentTarget.classList.add('active');
            updateUI();
        }

        function addExpense() {
            let a = parseFloat(document.getElementById('expenseAmount').value);
            let d = document.getElementById('expenseDate').value;
            let t = document.getElementById('expenseType').value;
            let n = document.getElementById('expenseNote').value.trim();
            let c = document.getElementById('expenseCurrency').value;
            if(isNaN(a) || !d) return alert('خانان پڕ بکە');
            // حفظ باسم desc ليتوافق مع النسخة الاحتياطية
            data.expense.push({id:Date.now(), type:t, desc:n, amount:a, currency:c, date:d});
            localStorage.setItem('propertyData', JSON.stringify(data));
            updateUI(); alert('تۆمار بوو ✅');
            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseNote').value = '';
        }

        function addIncome() {
            let a = parseFloat(document.getElementById('incomeAmount').value);
            let d = document.getElementById('incomeDate').value;
            let p = document.getElementById('incomeProperty').value;
            let c = document.getElementById('incomeCurrency').value;
            if(isNaN(a) || !d) return alert('خانان پڕ بکە');
            data.income.push({id:Date.now(), prop:p, amount:a, currency:c, date:d});
            localStorage.setItem('propertyData', JSON.stringify(data));
            updateUI(); alert('تم ✅');
        }

        function updateUI() {
            const incIQD = data.income.filter(i=>i.currency==='IQD').reduce((s,i)=>s+i.amount,0);
            const incUSD = data.income.filter(i=>i.currency==='USD').reduce((s,i)=>s+i.amount,0);
            const expIQD = data.expense.filter(e=>e.currency==='IQD').reduce((s,e)=>s+e.amount,0);
            const expUSD = data.expense.filter(e=>e.currency==='USD').reduce((s,e)=>s+e.amount,0);

            document.getElementById('incIQD').innerText = incIQD.toLocaleString() + ' د.ع';
            document.getElementById('incUSD').innerText = incUSD.toLocaleString() + ' $';
            document.getElementById('expIQD').innerText = expIQD.toLocaleString() + ' د.ع';
            document.getElementById('expUSD').innerText = expUSD.toLocaleString() + ' $';
            document.getElementById('balIQD').innerText = (incIQD-expIQD).toLocaleString() + ' د.ع';
            document.getElementById('balUSD').innerText = (incUSD-expUSD).toLocaleString() + ' $';

            document.getElementById('incomeProperty').innerHTML = tenants.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');

            let h = '';
            tenants.forEach(p => {
                let mHtml = '<div style="display:flex; gap:2px; justify-content:flex-end; margin-top:5px;">';
                for(let m=1; m<=12; m++) {
                    let pay = data.income.find(inc => inc.prop===p.name && new Date(inc.date).getMonth()+1 === m);
                    let col = pay ? (pay.amount===0 ? '#212121' : '#4caf50') : '#f44336';
                    mHtml += `<div class="month-box" style="background:${col}">${m}</div>`;
                }
                h += `<div style="background:#fff; padding:12px; margin-bottom:10px; border-radius:12px; border:1px solid #eee; border-right:5px solid #1a73e8;"><b>${p.name}</b> <small style="float:left;">${p.rent > 5000 ? p.rent.toLocaleString() + ' IQD' : p.rent.toLocaleString() + ' $'}</small>${mHtml}</div></div>`;
            });
            document.getElementById('propertiesList').innerHTML = h;

            let exH = '';
            data.expense.slice(-20).reverse().forEach(ex => {
                let sym = ex.currency === 'USD' ? '$' : 'د.ع';
                // التعديل هنا لقراءة الملاحظات سواء كانت desc أو note
                let noteDisplay = (ex.desc || ex.note || '').trim();
                exH += `
                <div class="expense-card">
                    <div class="exp-main">
                        <div class="exp-right">
                            <span class="exp-type">${ex.type}</span>
                            <div class="exp-meta">${ex.date} ${noteDisplay ? '| ' + noteDisplay : ''}</div>
                        </div>
                        <div class="exp-center">
                            <span class="exp-amount">- ${ex.amount.toLocaleString()}</span>
                            <span class="exp-currency">${sym}</span>
                        </div>
                    </div>
                    <button class="delete-bar" onclick="del(${ex.id},'expense')">ژێبرن</button>
                </div>`;
            });
            document.getElementById('recentExpenses').innerHTML = exH;
        }

        function del(id, type) { if(confirm('ما تو پشت راستی؟')) { data[type] = data[type].filter(i=>i.id!==id); localStorage.setItem('propertyData', JSON.stringify(data)); updateUI(); } }
        function backupData() { let blob = new Blob([JSON.stringify({data, tenants})], {type:"application/json"}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Mulki_Backup.json"; a.click(); }
        function restoreData(e) { let reader = new FileReader(); reader.onload = (ev) => { let d = JSON.parse(ev.target.result); localStorage.setItem('propertyData', JSON.stringify(d.data)); localStorage.setItem('tenantList', JSON.stringify(d.tenants)); location.reload(); }; reader.readAsText(e.target.files[0]); }
        function exportImage() { html2canvas(document.getElementById('captureArea')).then(c => { let a=document.createElement('a'); a.download='report.png'; a.href=c.toDataURL(); a.click(); }); }
        
        window.onload = () => { 
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('expenseDate').value = today;
            document.getElementById('incomeDate').value = today;
            updateUI(); 
        };
    </script>
</body>
</html>
