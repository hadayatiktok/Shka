<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رێڤەبەریا مولكی - البنك السحابي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 10px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 25px 10px; text-align: center; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; background: none; font-size: 13px; font-weight: bold; color: #777; border-bottom: 3px solid transparent; transition: 0.3s; white-space: nowrap; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }
        .content { padding: 20px; min-height: 400px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* البطاقة الرئيسية */
        .owner-box { background: #e3f2fd; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #90caf9; }
        .summary-item { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; font-size: 13px; font-weight: bold;}
        .summary-item.total { border-top: 2px dashed #90caf9; padding-top: 12px; font-weight: 900; color: #b71c1c; font-size: 15px; background: #ffcdd2; padding: 10px; border-radius: 8px; margin-top: 10px;}
        .amount-col { text-align: left; display: flex; flex-direction: column; gap: 4px; }
        
        /* تصميم قائمة المستأجرين */
        .tenant-card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; border-right: 5px solid #1a73e8; }
        .month-grid { display: flex; gap: 3px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; direction: ltr; }
        .month-box { width: 25px; height: 25px; border-radius: 5px; display: flex; justify-content: center; align-items: center; color: white; font-size: 11px; font-weight: bold; }

        /* التصميم الجديد والمنظم للمصروفات */
        .expense-card { background: #fff; padding: 12px 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; border-right: 5px solid #d32f2f; display: flex; align-items: center; justify-content: space-between; }
        .expense-info { flex: 1; display: flex; flex-direction: column; }
        .expense-info b { font-size: 14px; color: #333; }
        .expense-info small { color: #777; font-size: 11px; margin-top: 2px; }
        .expense-value { text-align: center; padding: 0 10px; color: #d32f2f; font-weight: 900; font-size: 14px; white-space: nowrap; }
        .delete-btn { background: #ffefee; color: #d32f2f; padding: 8px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; font-size: 12px; line-height: 1; }

        /* الحقول والأزرار */
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; background: #fff; }
        .flex-row { display: flex; gap: 10px; }
        .btn-save { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; background: #1a73e8; color: white; }
        .backup-section { background: #fff3e0; border: 2px solid #ffb74d; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="font-weight: 900;">🏠 رێڤەبەريا مولكي</h2>
            <p style="font-size: 12px;">سيتەمێ رێكخستنا دارايي (البنك السحابي)</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(event, 'home')">سەرەکی</button>
            <button class="tab-btn" onclick="showTab(event, 'add-income')">داهاتی</button>
            <button class="tab-btn" onclick="showTab(event, 'add-expense')">مەسرهەف</button>
            <button class="tab-btn" onclick="showTab(event, 'settings')">رێكخستن</button>
        </div>
        <div class="content">
            <div id="home" class="tab-content active">
                <div id="captureArea">
                    <div class="owner-box">
                        <div style="color: #0d47a1; font-size: 15px; font-weight: 900; border-bottom: 2px solid #bbdefb; padding-bottom: 10px; margin-bottom: 15px; text-align: center;">📊 حسابێ گشتی</div>
                        <div class="summary-item">
                            <span>1. کرێیا وەرگرتی (المستلم):</span>
                            <div class="amount-col">
                                <span id="incIQD" style="color:#2e7d32;">0 د.ع</span>
                                <span id="incUSD" style="color:#1565c0;">0 $</span>
                            </div>
                        </div>
                        <div class="summary-item">
                            <span>2. کۆما خەرجکرن (المصروفات):</span>
                            <div class="amount-col">
                                <span id="expIQD" style="color:#d32f2f;">0 د.ع</span>
                                <span id="expUSD" style="color:#d32f2f;">0 $</span>
                            </div>
                        </div>
                        <div class="summary-item total">
                            <span>ماوە ل دەف تە (الباقي عندك):</span>
                            <div class="amount-col">
                                <span id="balIQD">0 د.ع</span>
                                <span id="balUSD">0 $</span>
                            </div>
                        </div>
                    </div>
                    <div id="propertiesList"></div>
                </div>
                <button onclick="exportImage()" style="background:#9c27b0; color:white; width:100%; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold; border:none;">📷 داگرتنا وێنەیی</button>
            </div>

            <div id="add-income" class="tab-content">
                <h3>تۆماركرنا داهاتی</h3>
                <div class="form-group"><label>کرێدار:</label><select id="incomeProperty"></select></div>
                <div class="form-group"><label>کۆژمێ پارەی:</label>
                    <div class="flex-row">
                        <input type="text" inputmode="numeric" id="incomeAmount" placeholder="0" style="flex:2">
                        <select id="incomeCurrency" style="flex:1"><option value="IQD">د.ع</option><option value="USD">$</option></select>
                    </div>
                </div>
                <div class="form-group"><label>رێکەفت:</label><input type="date" id="incomeDate"></div>
                <button class="btn-save" onclick="addIncome()">خەزن بکە</button>
            </div>

            <div id="add-expense" class="tab-content">
                <h3>تۆمارکرنا مەسرهەف</h3>
                <div class="form-group"><label>جۆر:</label><select id="expenseType"><option value="حوالە بۆ خوداني">حوالە بۆ خوداني</option><option value="صيانة">صيانة / كارەب</option><option value="یێن دی">یێن دی</option></select></div>
                <div class="form-group"><label>بڕ:</label>
                    <div class="flex-row">
                        <input type="text" inputmode="numeric" id="expenseAmount" placeholder="0" style="flex:2">
                        <select id="expenseCurrency" style="flex:1"><option value="IQD">د.ع</option><option value="USD">$</option></select>
                    </div>
                </div>
                <div class="form-group"><label>رێکەفت:</label><input type="date" id="expenseDate"></div>
                <button class="btn-save" style="background:#d32f2f;" onclick="addExpense()">تۆمار بکە</button>
                
                <h3 style="margin-top:25px; font-size:14px; color:#d32f2f;">دوماهيک کارێن خەرجکرنێ:</h3>
                <div id="recentExpenses" style="margin-top:10px;"></div>
            </div>

            <div id="settings" class="tab-content">
                <div class="backup-section">
                    <button onclick="backupData()" style="background:#ff9800; color:white; width:100%; border:none; padding:12px; border-radius:8px; font-weight:bold;">💾 حفظ نسخة لـ iCloud</button>
                    <input type="file" id="fileInput" style="display:none;" onchange="restoreData(event)">
                    <button onclick="document.getElementById('fileInput').click()" style="background:#f57c00; color:white; width:100%; border:none; padding:12px; border-radius:8px; font-weight:bold; margin-top:10px;">📂 استعادة البيانات</button>
                </div>
                <button onclick="if(confirm('Delete all?')) {localStorage.clear(); location.reload();}" style="background:#d32f2f; color:white; width:100%; padding:12px; border-radius:8px; font-weight:bold; border:none; margin-top:20px;">⚠️ مسح البيانات نهائياً</button>
            </div>
        </div>
    </div>

    <script>
        let tenants = JSON.parse(localStorage.getItem('tenantList')) || [
            {id:'1',name:'شوقە 1 - ماهر',rent:'200,000 د.ع'},{id:'2',name:'شوقە 2 - جاسم',rent:'200,000 د.ع'},
            {id:'3',name:'شوقە 3 - فرهاد',rent:'200,000 د.ع'},{id:'4',name:'شوقە 4 - كاوة',rent:'200,000 د.ع'},
            {id:'5',name:'مەخزەن - ئەرشەد',rent:'1,800 $'}
        ];
        let data = JSON.parse(localStorage.getItem('propertyData')) || {income:[], expense:[]};

        function showTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(e) e.currentTarget.classList.add('active');
            updateUI();
        }

        function addIncome() {
            let val = document.getElementById('incomeAmount').value;
            let a = parseFloat(val.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)));
            let d = document.getElementById('incomeDate').value;
            let p = document.getElementById('incomeProperty').value;
            let c = document.getElementById('incomeCurrency').value;
            if(val==='' || isNaN(a) || !d) return alert('خانان پڕ بکە');
            data.income.push({id:Date.now(), prop:p, amount:a, currency:c, date:d});
            localStorage.setItem('propertyData', JSON.stringify(data));
            updateUI(); alert('تم ✅');
            document.getElementById('incomeAmount').value = '';
        }

        function addExpense() {
            let val = document.getElementById('expenseAmount').value;
            let a = parseFloat(val.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)));
            let d = document.getElementById('expenseDate').value;
            let t = document.getElementById('expenseType').value;
            let c = document.getElementById('expenseCurrency').value;
            if(val==='' || isNaN(a) || !d) return alert('خانان پڕ بکە');
            data.expense.push({id:Date.now(), type:t, amount:a, currency:c, date:d});
            localStorage.setItem('propertyData', JSON.stringify(data));
            updateUI(); alert('تم ✅');
            document.getElementById('expenseAmount').value = '';
        }

        function updateUI() {
            const incIQD = data.income.filter(i=>i.currency==='IQD').reduce((s,i)=>s+i.amount,0);
            const incUSD = data.income.filter(i=>i.currency==='USD').reduce((s,i)=>s+i.amount,0);
            const expIQD = data.expense.filter(e=>e.currency==='IQD').reduce((s,e)=>s+e.amount,0);
            const expUSD = data.expense.filter(e=>e.currency==='USD').reduce((s,e)=>s+e.amount,0);

            document.getElementById('incIQD').innerText = incIQD.toLocaleString() + ' د.ع';
            document.getElementById('incUSD').innerText = incUSD.toLocaleString() + ' $';
            document.getElementById('expIQD').innerText = expIQD.toLocaleString() + ' د.ع';
            document.getElementById('expUSD').innerText = expUSD.toLocaleString() + ' $';
            document.getElementById('balIQD').innerText = (incIQD-expIQD).toLocaleString() + ' د.ع';
            document.getElementById('balUSD').innerText = (incUSD-expUSD).toLocaleString() + ' $';

            document.getElementById('incomeProperty').innerHTML = tenants.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');

            // قائمة العقارات
            let h = '';
            tenants.forEach(p => {
                let mHtml = '<div class="month-grid">';
                for(let m=1; m<=12; m++) {
                    let pay = data.income.find(inc => inc.prop===p.name && new Date(inc.date).getMonth()+1 === m);
                    let col = pay ? (pay.amount===0 ? '#212121' : '#4caf50') : '#f44336';
                    mHtml += `<div class="month-box" style="background:${col}">${m}</div>`;
                }
                mHtml += '</div>';
                h += `<div class="tenant-card"><div><b>${p.name}</b> <small style="float:left;">${p.rent}</small></div>${mHtml}</div>`;
            });
            document.getElementById('propertiesList').innerHTML = h;

            // قائمة المصروفات (التصميم الجديد المصلح)
            let exH = '';
            data.expense.slice(-10).reverse().forEach(ex => {
                let sym = ex.currency === 'USD' ? '$' : 'د.ع';
                exH += `
                <div class="expense-card">
                    <div class="expense-info">
                        <b>${ex.type}</b>
                        <small>${ex.date}</small>
                    </div>
                    <div class="expense-value">-${ex.amount.toLocaleString()} ${sym}</div>
                    <button class="delete-btn" onclick="del(${ex.id},'expense')">X</button>
                </div>`;
            });
            document.getElementById('recentExpenses').innerHTML = exH || '<p style="text-align:center; color:#888;">چ خەرجی نینە</p>';
        }

        function del(id, type) { 
            if(confirm('ما تو پشت راستی؟')) {
                data[type] = data[type].filter(i=>i.id!==id); 
                localStorage.setItem('propertyData', JSON.stringify(data)); 
                updateUI(); 
            }
        }

        function backupData() {
            let blob = new Blob([JSON.stringify({data, tenants})], {type:"application/json"});
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Mulki_Backup.json"; a.click();
        }

        function restoreData(e) {
            let reader = new FileReader(); 
            reader.onload = (ev) => {
                try {
                    let d = JSON.parse(ev.target.result);
                    if(d.data && d.tenants) {
                        localStorage.setItem('propertyData', JSON.stringify(d.data));
                        localStorage.setItem('tenantList', JSON.stringify(d.tenants));
                        alert('داتا ب سەرکەفتیانە ڤەگەڕیا! ✅');
                        location.reload();
                    } else { alert('فایل خەلەتە ❌'); }
                } catch(err) { alert('هەڵەیەک ڕوویدا ❌'); }
            }; 
            reader.readAsText(e.target.files[0]);
        }

        function exportImage() { 
            html2canvas(document.getElementById('captureArea')).then(c => { 
                let a=document.createElement('a'); a.download='Report_'+new Date().toLocaleDateString()+'.png'; a.href=c.toDataURL(); a.click(); 
            }); 
        }

        window.onload = () => { 
            document.getElementById('incomeDate').value = new Date().toISOString().split('T')[0]; 
            updateUI(); 
        };
    </script>
</body>
</html>
